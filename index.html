<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Personalizado</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        .login-card h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .login-card p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-size: 12px;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .btn-google-custom {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            background-color: #db4437;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.3s;
            box-sizing: border-box;
        }

        .btn-google-custom:hover {
            background-color: #c53929;
        }

        .btn-google-custom img {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            background: white;
            border-radius: 50%;
            padding: 2px;
        }

        .divider {
            margin: 20px 0;
            position: relative;
            text-align: center;
        }

        .divider span {
            background: white;
            padding: 0 10px;
            color: #999;
            font-size: 12px;
            position: relative;
            z-index: 1;
        }

        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: #eee;
            z-index: 0;
        }

        .hidden { display: none; }
        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 15px auto;
            border: 3px solid #667eea;
            display: block;
        }
        .btn-logout {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 14px;
        }
        .btn-logout:hover { background: #c82333; }
        .error-msg {
            color: #dc3545;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        
        <div id="login-view">
            <h1>Bienvenido</h1>
            <p>Ingresa a tu cuenta para continuar</p>

            <form onsubmit="event.preventDefault();">
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" placeholder="nombre@ejemplo.com">
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="••••••••">
                </div>
                <button type="submit" style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:5px; cursor:pointer;">Entrar</button>
            </form>

            <div class="divider">
                <span>O continúa con</span>
            </div>

            <button class="btn-google-custom" onclick="loginGoogle()">
                <img src="https://www.gstatic.com/images/branding/product/1x/googleg_32dp.png" alt="G">
                Iniciar con Google
            </button>
            <p class="error-msg" id="error-msg"></p>
        </div>

        <div id="user-view" class="hidden">
            <img id="user-photo" class="user-avatar" src="" alt="Foto">
            <h1 id="user-name">Nombre</h1>
            <p id="user-email">email@ejemplo.com</p>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 🔥 TU CONFIGURACIÓN - VERIFICA QUE ESTÉ BIEN COPIADA
        const firebaseConfig = {
            apiKey: "AIzaSyAyS_7VY6bLH3sCf3I78GyABUeysZwNjrg",
            authDomain: "iniciosesion-60bcb.firebaseapp.com",
            projectId: "iniciosesion-60bcb",
            storageBucket: "iniciosesion-60bcb.firebasestorage.app",
            messagingSenderId: "857443638405",
            appId: "1:857443638405:web:d73d51da9e24ee07df9dec",
            measurementId: "G-P7DG8BNLR7"
        };

        // Debug: Verificar que la config existe
        console.log("🔥 Firebase Config:", firebaseConfig);
        console.log("🔑 API Key:", firebaseConfig.apiKey);

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const provider = new GoogleAuthProvider();

            console.log("✅ Firebase inicializado correctamente");

            const loginView = document.getElementById('login-view');
            const userView = document.getElementById('user-view');
            const userName = document.getElementById('user-name');
            const userEmail = document.getElementById('user-email');
            const userPhoto = document.getElementById('user-photo');
            const errorMsg = document.getElementById('error-msg');

            window.loginGoogle = () => {
                console.log("🔵 Intentando login...");
                signInWithPopup(auth, provider)
                    .then((result) => {
                        console.log("✅ Login exitoso:", result.user);
                    })
                    .catch((error) => {
                        console.error("❌ Error:", error.code, error.message);
                        errorMsg.textContent = "Error: " + error.message;
                        errorMsg.style.display = 'block';
                    });
            };

            window.logout = () => {
                signOut(auth).then(() => {
                    console.log("👋 Sesión cerrada");
                });
            };

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    console.log("👤 Usuario logueado:", user.email);
                    loginView.classList.add('hidden');
                    userView.classList.remove('hidden');
                    
                    userName.textContent = user.displayName || 'Usuario';
                    userEmail.textContent = user.email;
                    userPhoto.src = user.photoURL || 'https://via.placeholder.com/80';
                } else {
                    console.log("🔒 No hay sesión activa");
                    loginView.classList.remove('hidden');
                    userView.classList.add('hidden');
                }
            });

        } catch (error) {
            console.error("❌ Error al inicializar Firebase:", error);
            alert("Error al inicializar Firebase: " + error.message);
        }
    </script>
</body>
</html>
